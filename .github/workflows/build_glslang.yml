

on:
    workflow_call:
        inputs:
            platform:
                type: string
                required: true
            tests:
                description: "Build and run glslang's test suite (cmake var)"
                type: string
            shared:
                description: "Build shared libraries"
                type: string
            cmake_build_type:
                description: "Cmake build type"
                type: string
                required: true
            cc:
                description: "CC to use (for Unix platforms)"
                type: string
            cxx:
                description: "CXX to use (for Unix platforms)"
                type: string

jobs:
  build_glslang:
    runs-on: ${{ inputs.platform }}
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@d632683dd7b4114ad314bca15554477dd762a938 # v4.2.0
      - uses: lukka/get-cmake@070a0507a7abe157ef918deec391da1be197d2d1 # v3.30.3
      - uses: actions/setup-python@f677139bbe7f9c59b41e40162b753c062f5d49a3 # v5.2.0
        with:
          python-version: '3.7'
      - run: python update_glslang_sources.py
      - name: Build (MSVC)
        # TODO: I think this needs to be startswith
        if: inputs.platform == 'windows'
        run: |
          cmake -S. -Bbuild -G "Visual Studio 16 2019" -A x64 -DCMAKE_INSTALL_PREFIX="$PWD/build/install" -DBUILD_WERROR=ON -D GLSLANG_TESTS=${{inputs.tests}} -DBUILD_SHARED_LIBS=${{inputs.shared}}
          cmake --build build --config ${{inputs.cmake_build_type}} --target install
      - name: Build (Unix)
        if: inputs.platform != 'windows'
        run: |
            cmake -S . -B build -D CMAKE_BUILD_TYPE=${{matrix.cmake_build_type}} -G Ninja -DBUILD_WERROR=ON -D GLSLANG_TESTS=ON
            cmake --build build
        env:
          CC: ${{inputs.cc}}
          CXX: ${{inputs.cxx}}
      - name: Test
        if: inputs.tests
        run: "ctest -C ${{matrix.cmake_build_type}} --output-on-failure --test-dir build"
